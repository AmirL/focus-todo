name: Code Coverage

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run unit tests with coverage
        run: pnpm vitest run --coverage

      - name: Run Cypress with coverage
        continue-on-error: true
        uses: cypress-io/github-action@v6
        with:
          start: pnpm dev
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
        env:
          CYPRESS_COVERAGE: 'true'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          CYPRESS_TEST_EMAIL: ${{ vars.TEST_EMAIL }}
          CYPRESS_TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          CYPRESS_API_TEST_KEY: ${{ secrets.API_TEST_KEY }}

      - name: Merge coverage reports
        if: always()
        run: |
          mkdir -p coverage/merged

          # Collect available coverage JSON files
          COVERAGE_FILES=""
          if [ -f coverage/unit/coverage-final.json ]; then
            COVERAGE_FILES="$COVERAGE_FILES coverage/unit/coverage-final.json"
            echo "Found unit test coverage"
          fi
          if [ -f coverage/coverage-final.json ]; then
            COVERAGE_FILES="$COVERAGE_FILES coverage/coverage-final.json"
            echo "Found e2e test coverage"
          fi

          if [ -z "$COVERAGE_FILES" ]; then
            echo "No coverage files found"
            exit 0
          fi

          # Copy coverage files into a temp dir for nyc merge
          mkdir -p coverage/to-merge
          INDEX=0
          for f in $COVERAGE_FILES; do
            cp "$f" "coverage/to-merge/coverage-${INDEX}.json"
            INDEX=$((INDEX + 1))
          done

          # Merge and generate reports
          pnpm exec nyc merge coverage/to-merge coverage/merged/coverage-final.json
          pnpm exec nyc report \
            --temp-dir coverage/merged \
            --reporter=text-summary \
            --reporter=json-summary \
            --report-dir coverage/merged

      - name: Print coverage summary
        if: always()
        run: |
          if [ -f coverage/merged/coverage-summary.json ]; then
            LABEL="unit + e2e"
            SUMMARY_FILE="coverage/merged/coverage-summary.json"
          elif [ -f coverage/unit/coverage-final.json ]; then
            LABEL="unit tests only"
            # Generate summary from unit coverage
            pnpm exec nyc report --temp-dir coverage/unit --reporter=json-summary --report-dir coverage/unit 2>/dev/null
            SUMMARY_FILE="coverage/unit/coverage-summary.json"
          fi

          if [ -n "$SUMMARY_FILE" ] && [ -f "$SUMMARY_FILE" ]; then
            echo "## Coverage Summary ($LABEL)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            python3 -c "
          import json
          with open('$SUMMARY_FILE') as f:
              data = json.load(f)
          total = data.get('total', {})
          for key in ['lines', 'statements', 'functions', 'branches']:
              metric = total.get(key, {})
              pct = metric.get('pct', 'N/A')
              print(f'{key}: {pct}%')
          " >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No coverage data available" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_id }}
          path: coverage/
          retention-days: 14
          if-no-files-found: warn
