name: Code Coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run Cypress with coverage
        uses: cypress-io/github-action@v6
        with:
          start: pnpm dev
          wait-on: 'http://localhost:3000'
          wait-on-timeout: 120
        env:
          CYPRESS_COVERAGE: 'true'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          CYPRESS_TEST_EMAIL: ${{ vars.TEST_EMAIL }}
          CYPRESS_TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          CYPRESS_API_TEST_KEY: ${{ secrets.API_TEST_KEY }}

      - name: Print coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            npx nyc report --reporter=text-summary 2>/dev/null || python3 -c "
          import json
          with open('coverage/coverage-summary.json') as f:
              data = json.load(f)
          total = data.get('total', {})
          for key in ['lines', 'statements', 'functions', 'branches']:
              metric = total.get(key, {})
              pct = metric.get('pct', 'N/A')
              print(f'{key}: {pct}%')
          "
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No coverage summary found" >> $GITHUB_STEP_SUMMARY
            echo "Coverage files found:"
            find coverage -type f 2>/dev/null || echo "No coverage directory"
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_id }}
          path: coverage/
          retention-days: 14
          if-no-files-found: warn

      - name: Post coverage comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'coverage/coverage-summary.json';

            if (!fs.existsSync(path)) {
              console.log('No coverage summary found, skipping comment');
              return;
            }

            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            const total = data.total || {};

            const metrics = ['lines', 'statements', 'functions', 'branches'];
            const rows = metrics.map(m => {
              const pct = total[m]?.pct ?? 'N/A';
              const covered = total[m]?.covered ?? '-';
              const totalCount = total[m]?.total ?? '-';
              return `| ${m} | ${pct}% | ${covered}/${totalCount} |`;
            }).join('\n');

            const body = `## Code Coverage Report

            | Metric | Coverage | Covered/Total |
            |--------|----------|---------------|
            ${rows}

            > Generated from Cypress E2E tests with Istanbul instrumentation.
            `.replace(/^            /gm, '');

            // Find existing coverage comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Code Coverage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Generate and commit coverage badge
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [ ! -f coverage/coverage-summary.json ]; then
            echo "No coverage summary found, skipping badge generation"
            exit 0
          fi

          mkdir -p badges
          python3 -c "
          import json, pathlib

          with open('coverage/coverage-summary.json') as f:
              data = json.load(f)
          pct = data.get('total', {}).get('lines', {}).get('pct', 0)
          label = f'{pct:.1f}%'

          if pct >= 80: color = '#4c1'
          elif pct >= 60: color = '#dfb317'
          elif pct >= 40: color = '#fe7d37'
          else: color = '#e05d44'

          svg = f'''<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"140\" height=\"20\" role=\"img\" aria-label=\"coverage: {label}\">
            <title>coverage: {label}</title>
            <linearGradient id=\"s\" x2=\"0\" y2=\"100%\">
              <stop offset=\"0\" stop-color=\"#bbb\" stop-opacity=\".1\"/>
              <stop offset=\"1\" stop-opacity=\".1\"/>
            </linearGradient>
            <clipPath id=\"r\">
              <rect width=\"140\" height=\"20\" rx=\"3\" fill=\"#fff\"/>
            </clipPath>
            <g clip-path=\"url(#r)\">
              <rect width=\"68\" height=\"20\" fill=\"#555\"/>
              <rect x=\"68\" width=\"72\" height=\"20\" fill=\"{color}\"/>
              <rect width=\"140\" height=\"20\" fill=\"url(#s)\"/>
            </g>
            <g fill=\"#fff\" text-anchor=\"middle\" font-family=\"Verdana,Geneva,DejaVu Sans,sans-serif\" text-rendering=\"geometricPrecision\" font-size=\"110\">
              <text aria-hidden=\"true\" x=\"350\" y=\"150\" fill=\"#010101\" fill-opacity=\".3\" transform=\"scale(.1)\" textLength=\"580\">coverage</text>
              <text x=\"350\" y=\"140\" transform=\"scale(.1)\" fill=\"#fff\" textLength=\"580\">coverage</text>
              <text aria-hidden=\"true\" x=\"1030\" y=\"150\" fill=\"#010101\" fill-opacity=\".3\" transform=\"scale(.1)\" textLength=\"520\">{label}</text>
              <text x=\"1030\" y=\"140\" transform=\"scale(.1)\" fill=\"#fff\" textLength=\"520\">{label}</text>
            </g>
          </svg>'''

          pathlib.Path('badges/coverage.svg').write_text(svg)
          print(f'Badge generated: coverage {label}')
          "

          # Commit and push the badge
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add badges/coverage.svg
          git diff --cached --quiet && echo "Badge unchanged, skipping commit" && exit 0
          git commit -m "Update coverage badge [skip ci]"
          git push
