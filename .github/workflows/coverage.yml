name: Code Coverage

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Run Cypress with coverage
        uses: cypress-io/github-action@v6
        with:
          start: pnpm dev
          wait-on: 'http-get://localhost:3000'
          wait-on-timeout: 120
          install: false
        env:
          CYPRESS_COVERAGE: 'true'
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          API_KEY_SECRET: ${{ secrets.API_KEY_SECRET }}
          CYPRESS_TEST_EMAIL: ${{ vars.TEST_EMAIL }}
          CYPRESS_TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          CYPRESS_API_TEST_KEY: ${{ secrets.API_TEST_KEY }}

      - name: Print coverage summary
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            echo "## Coverage Summary" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            npx nyc report --reporter=text-summary 2>/dev/null || python3 -c "
          import json
          with open('coverage/coverage-summary.json') as f:
              data = json.load(f)
          total = data.get('total', {})
          for key in ['lines', 'statements', 'functions', 'branches']:
              metric = total.get(key, {})
              pct = metric.get('pct', 'N/A')
              print(f'{key}: {pct}%')
          "
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "No coverage summary found" >> $GITHUB_STEP_SUMMARY
            echo "Coverage files found:"
            find coverage -type f 2>/dev/null || echo "No coverage directory"
          fi

      - name: Upload coverage artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ github.run_id }}
          path: coverage/
          retention-days: 14
          if-no-files-found: warn

      - name: Post coverage comment on PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'coverage/coverage-summary.json';

            if (!fs.existsSync(path)) {
              console.log('No coverage summary found, skipping comment');
              return;
            }

            const data = JSON.parse(fs.readFileSync(path, 'utf8'));
            const total = data.total || {};

            const metrics = ['lines', 'statements', 'functions', 'branches'];
            const rows = metrics.map(m => {
              const pct = total[m]?.pct ?? 'N/A';
              const covered = total[m]?.covered ?? '-';
              const totalCount = total[m]?.total ?? '-';
              return `| ${m} | ${pct}% | ${covered}/${totalCount} |`;
            }).join('\n');

            const body = `## Code Coverage Report

            | Metric | Coverage | Covered/Total |
            |--------|----------|---------------|
            ${rows}

            > Generated from Cypress E2E tests with Istanbul instrumentation.
            `.replace(/^            /gm, '');

            // Find existing coverage comment to update
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('## Code Coverage Report')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
