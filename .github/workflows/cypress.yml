name: Cypress E2E Tests

on:
  deployment_status:

permissions:
  contents: read
  actions: read
  pull-requests: write
  deployments: read

jobs:
  cypress-run:
    # Run when Vercel deployment succeeds
    if: github.event.deployment_status.state == 'success' && contains(github.event.deployment_status.environment_url, 'vercel.app')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        containers: [1, 2, 3]
    steps:
      - name: Log deployment info
        id: deployment-info
        run: |
          echo "Environment URL: ${{ github.event.deployment_status.environment_url }}"
          echo "Environment: ${{ github.event.deployment_status.environment }}"
          echo "Deployment ref: ${{ github.event.deployment_status.deployment.ref }}"
          echo "Deployment SHA: ${{ github.event.deployment_status.deployment.sha }}"

          # Skip Production deployments (main branch) - already tested in PR
          # Vercel sets environment to "Production" for main, "Preview" for PRs
          # Note: deployment.ref is often empty for Production deployments
          ENV="${{ github.event.deployment_status.environment }}"
          if [ "$ENV" = "Production" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping: Production deployment (already tested in PR)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.deployment-info.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment_status.deployment.sha }}

      - name: Setup pnpm
        if: steps.deployment-info.outputs.skip != 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        if: steps.deployment-info.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.deployment-info.outputs.skip != 'true'
        run: pnpm install

      - name: Cypress run against deployment
        if: steps.deployment-info.outputs.skip != 'true'
        uses: cypress-io/github-action@v6
        with:
          wait-on: ${{ github.event.deployment_status.target_url }}
          wait-on-timeout: 120
        env:
          CYPRESS_BASE_URL: ${{ github.event.deployment_status.target_url }}
          CYPRESS_TEST_EMAIL: ${{ vars.TEST_EMAIL }}
          CYPRESS_TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          CYPRESS_API_TEST_KEY: ${{ secrets.API_TEST_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SPLIT: ${{ strategy.job-total }}
          SPLIT_INDEX: ${{ strategy.job-index }}

      - name: Merge mochawesome reports
        if: always() && steps.deployment-info.outputs.skip != 'true'
        run: |
          npx mochawesome-merge cypress/results/*.json -o cypress/results/merged-report.json 2>/dev/null || echo "No mochawesome reports to merge"

      - name: Upload Cypress artifacts
        if: always() && steps.deployment-info.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results-${{ github.run_id }}-${{ matrix.containers }}
          path: |
            cypress/screenshots
            cypress/videos
            cypress/results
          retention-days: 7
          if-no-files-found: ignore

  detect-flaky:
    needs: cypress-run
    if: always() && !cancelled() && needs.cypress-run.result != 'skipped'
    runs-on: ubuntu-latest
    steps:
      - name: Skip if Production deployment
        id: check-env
        run: |
          ENV="${{ github.event.deployment_status.environment }}"
          if [ "$ENV" = "Production" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping: Production deployment"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.check-env.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment_status.deployment.sha }}
          sparse-checkout: |
            scripts

      - name: Setup Node.js
        if: steps.check-env.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download all mochawesome artifacts
        if: steps.check-env.outputs.skip != 'true'
        uses: actions/download-artifact@v4
        with:
          pattern: cypress-results-${{ github.run_id }}-*
          path: all-results
          merge-multiple: false

      - name: Restore flaky test history
        if: steps.check-env.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Download the latest flaky-history artifact from previous runs
          ARTIFACT_ID=$(gh api repos/${{ github.repository }}/actions/artifacts \
            --jq '[.artifacts[] | select(.name == "flaky-test-history") | select(.expired == false)] | sort_by(.created_at) | last | .id' 2>/dev/null || echo "")
          if [ -n "$ARTIFACT_ID" ] && [ "$ARTIFACT_ID" != "null" ]; then
            gh api repos/${{ github.repository }}/actions/artifacts/$ARTIFACT_ID/zip > /tmp/history.zip 2>/dev/null
            unzip -o /tmp/history.zip -d . 2>/dev/null || echo "Could not extract history"
            echo "Restored flaky history from artifact $ARTIFACT_ID"
          else
            echo "No previous flaky history found, starting fresh"
          fi

      - name: Collect current test results
        if: steps.check-env.outputs.skip != 'true'
        run: |
          node scripts/collect-test-results.cjs all-results > current-results.json
          echo "Current results:"
          cat current-results.json | head -c 500

      - name: Analyze flaky tests and generate summary
        if: steps.check-env.outputs.skip != 'true'
        run: |
          node scripts/analyze-flaky-tests.cjs flaky-history.json current-results.json >> $GITHUB_STEP_SUMMARY

      - name: Save flaky test history
        if: always() && steps.check-env.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: flaky-test-history
          path: flaky-history.json
          overwrite: true
          retention-days: 90

      - name: Label PR if flaky tests detected
        if: steps.check-env.outputs.skip != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f /tmp/flaky-test-names.json ]; then
            echo "No flaky tests detected"
            exit 0
          fi

          FLAKY_COUNT=$(node --input-type=commonjs -e "console.log(JSON.parse(require('fs').readFileSync('/tmp/flaky-test-names.json','utf8')).length)")
          echo "Found $FLAKY_COUNT unreliable test(s) in history"

          # Find the PR number for this deployment
          PR_NUMBER=$(gh pr list --search "${{ github.event.deployment_status.deployment.sha }}" --state open --json number --jq '.[0].number' 2>/dev/null || echo "")

          if [ -n "$PR_NUMBER" ]; then
            gh pr edit "$PR_NUMBER" --add-label "flaky-tests" 2>/dev/null || \
              (gh label create "flaky-tests" --color "FBCA04" --description "PR has flaky E2E tests" 2>/dev/null; \
               gh pr edit "$PR_NUMBER" --add-label "flaky-tests")
            echo "Added 'flaky-tests' label to PR #$PR_NUMBER"
          else
            echo "Could not find PR for this deployment, skipping label"
          fi
