name: Cypress E2E Tests

on:
  deployment_status:

jobs:
  cypress-run:
    # Run only when Vercel deployment succeeds and not a PR deployment
    if: github.event.deployment_status.state == 'success' && contains(github.event.deployment_status.environment_url, 'vercel.app')
    runs-on: ubuntu-latest
    steps:
      - name: Check if PR deployment (skip if so)
        id: check-pr
        run: |
          REF="${{ github.event.deployment_status.deployment.ref }}"
          echo "Deployment ref: $REF"

          # Always run tests for main branch deployments
          if [ "$REF" = "main" ] || [ "$REF" = "master" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Running: This is a main branch deployment"
            exit 0
          fi

          # For other branches, check if there's an open PR (skip to avoid duplicate runs)
          PR_COUNT=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/pulls?state=open&head=${{ github.repository_owner }}:$REF" \
            | jq length)
          if [ "$PR_COUNT" -gt 0 ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping: This is a PR preview deployment"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Running: This is a branch push deployment (no open PR)"
          fi

      - name: Get branch name from deployment
        if: steps.check-pr.outputs.skip != 'true'
        id: branch
        run: |
          # Try to get branch from deployment ref or extract from URL
          BRANCH="${{ github.event.deployment_status.deployment.ref }}"
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
            # Extract from environment URL (e.g., feature-branch-abc123.vercel.app)
            BRANCH=$(echo "${{ github.event.deployment_status.environment_url }}" | sed -E 's/https:\/\/([^-]+(-[^-]+)*)-[a-z0-9]+-[^.]+\.vercel\.app/\1/' | sed 's/-$//')
          fi
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Detected branch: $BRANCH"

      - name: Checkout
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup pnpm
        if: steps.check-pr.outputs.skip != 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.check-pr.outputs.skip != 'true'
        run: pnpm install

      - name: Cypress run against preview deployment
        if: steps.check-pr.outputs.skip != 'true'
        uses: cypress-io/github-action@v6
        with:
          wait-on: ${{ github.event.deployment_status.target_url }}
          wait-on-timeout: 120
          record: true
          tag: ${{ steps.branch.outputs.branch }}
        env:
          CYPRESS_BASE_URL: ${{ github.event.deployment_status.target_url }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_TEST_EMAIL: ${{ vars.TEST_EMAIL }}
          CYPRESS_TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          CYPRESS_API_TEST_KEY: ${{ secrets.API_TEST_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_INFO_BRANCH: ${{ steps.branch.outputs.branch }}
          COMMIT_INFO_SHA: ${{ github.event.deployment_status.deployment.sha }}
