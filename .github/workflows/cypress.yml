name: Cypress E2E Tests

on:
  deployment_status:

jobs:
  cypress-run:
    # Run when Vercel deployment succeeds
    if: github.event.deployment_status.state == 'success' && contains(github.event.deployment_status.environment_url, 'vercel.app')
    runs-on: ubuntu-latest
    steps:
      - name: Log deployment info
        id: deployment-info
        run: |
          echo "Environment URL: ${{ github.event.deployment_status.environment_url }}"
          echo "Environment: ${{ github.event.deployment_status.environment }}"
          echo "Deployment ref: ${{ github.event.deployment_status.deployment.ref }}"
          echo "Deployment SHA: ${{ github.event.deployment_status.deployment.sha }}"

          # Skip Production deployments (main branch) - already tested in PR
          # Vercel sets environment to "Production" for main, "Preview" for PRs
          # Note: deployment.ref is often empty for Production deployments
          ENV="${{ github.event.deployment_status.environment }}"
          if [ "$ENV" = "Production" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping: Production deployment (already tested in PR)"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout
        if: steps.deployment-info.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.deployment_status.deployment.sha }}
          fetch-depth: 0

      - name: Get branch name
        if: steps.deployment-info.outputs.skip != 'true'
        id: branch
        run: |
          # Try deployment ref first
          BRANCH="${{ github.event.deployment_status.deployment.ref }}"

          # If empty, try to find branch from git
          if [ -z "$BRANCH" ] || [ "$BRANCH" = "null" ]; then
            # Get the branch that contains this commit
            BRANCH=$(git branch -r --contains ${{ github.event.deployment_status.deployment.sha }} | grep -v HEAD | head -1 | sed 's|origin/||' | xargs)
          fi

          # Final fallback
          if [ -z "$BRANCH" ]; then
            BRANCH="unknown"
          fi

          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          echo "Branch: $BRANCH"

      - name: Get PR number for commit
        if: steps.deployment-info.outputs.skip != 'true'
        id: pr-info
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find PR associated with this commit for Cypress Cloud Branch Review
          COMMIT_SHA="${{ github.event.deployment_status.deployment.sha }}"
          if [ -n "$COMMIT_SHA" ]; then
            PR_NUMBER=$(gh api repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls --jq '.[0].number' 2>/dev/null || echo "")
            PR_URL=$(gh api repos/${{ github.repository }}/commits/${COMMIT_SHA}/pulls --jq '.[0].html_url' 2>/dev/null || echo "")
          fi
          echo "pr_number=${PR_NUMBER:-}" >> $GITHUB_OUTPUT
          echo "pr_url=${PR_URL:-}" >> $GITHUB_OUTPUT
          echo "PR Number: ${PR_NUMBER:-none}"

      - name: Setup pnpm
        if: steps.deployment-info.outputs.skip != 'true'
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node.js
        if: steps.deployment-info.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        if: steps.deployment-info.outputs.skip != 'true'
        run: pnpm install

      - name: Cypress run against deployment
        if: steps.deployment-info.outputs.skip != 'true'
        uses: cypress-io/github-action@v6
        with:
          wait-on: ${{ github.event.deployment_status.target_url }}
          wait-on-timeout: 120
          record: true
          tag: ${{ steps.branch.outputs.branch }}
        env:
          CYPRESS_BASE_URL: ${{ github.event.deployment_status.target_url }}
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          CYPRESS_TEST_EMAIL: ${{ vars.TEST_EMAIL }}
          CYPRESS_TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}
          CYPRESS_API_TEST_KEY: ${{ secrets.API_TEST_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMIT_INFO_BRANCH: ${{ steps.branch.outputs.branch }}
          COMMIT_INFO_SHA: ${{ github.event.deployment_status.deployment.sha }}
          # PR info for Cypress Cloud Branch Review feature
          CYPRESS_PULL_REQUEST_ID: ${{ steps.pr-info.outputs.pr_number }}
          CYPRESS_PULL_REQUEST_URL: ${{ steps.pr-info.outputs.pr_url }}

      - name: Upload Cypress artifacts
        if: always() && steps.deployment-info.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: cypress-results-${{ github.run_id }}
          path: |
            cypress/screenshots
            cypress/videos
          retention-days: 7
          if-no-files-found: ignore
