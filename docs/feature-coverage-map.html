<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doable - Feature Coverage Map</title>
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; background: #0f0f0f; color: #e0e0e0; }

  .header { padding: 20px 32px; display: flex; align-items: baseline; gap: 16px; }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header .overall { font-size: 14px; color: #888; }
  .header .legend { margin-left: auto; display: flex; gap: 12px; font-size: 12px; color: #888; align-items: center; }
  .legend-bar { display: flex; height: 12px; width: 200px; border-radius: 3px; overflow: hidden; }
  .legend-bar span { flex: 1; }

  .controls { padding: 0 32px 12px; display: flex; gap: 12px; align-items: center; }
  .breadcrumb { font-size: 13px; color: #666; }
  .breadcrumb span { cursor: pointer; color: #888; }
  .breadcrumb span:hover { color: #bbb; }

  #chart { width: 100%; height: calc(100vh - 80px); }

  .tooltip {
    position: fixed; pointer-events: none; background: #1a1a1a; border: 1px solid #333;
    border-radius: 8px; padding: 12px 16px; font-size: 13px; line-height: 1.6;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5); z-index: 100; max-width: 320px;
  }
  .tooltip .name { font-weight: 600; font-size: 14px; margin-bottom: 4px; }
  .tooltip .pct { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
  .tooltip .detail { color: #888; }
  .tooltip .bar { height: 6px; background: #2a2a2a; border-radius: 3px; margin-top: 8px; overflow: hidden; }
  .tooltip .bar-fill { height: 100%; border-radius: 3px; }
</style>
</head>
<body>

<div class="header">
  <h1>Feature Coverage Map</h1>
  <span class="overall" id="overall"></span>
  <div class="legend">
    <span>0%</span>
    <div class="legend-bar">
      <span style="background:#c0392b"></span>
      <span style="background:#d35400"></span>
      <span style="background:#f39c12"></span>
      <span style="background:#27ae60"></span>
      <span style="background:#2ecc71"></span>
    </div>
    <span>100%</span>
  </div>
</div>

<div class="controls">
  <div class="breadcrumb" id="breadcrumb"></div>
</div>

<div id="chart"></div>
<div class="tooltip" id="tooltip" style="display:none"></div>

<script>
// ============================================================
// DATA: Auto-generated by scripts/generate-coverage-map.js
// Each leaf node needs: name, lines (total), covered, desc.
// Group nodes need: name, children[].
// Aggregates (pct, gap) are computed automatically.
// ============================================================
const data = {
  "name": "Doable",
  "children": [
    {
      "name": "Pages",
      "children": [
        {
          "name": "Tasks (Today)",
          "lines": 171,
          "covered": 29,
          "desc": "Main task list page with filters, grouping, actions"
        },
        {
          "name": "Login",
          "lines": 59,
          "covered": 0,
          "desc": "Authentication forms, validation, test user button"
        },
        {
          "name": "Calendar Day",
          "lines": 34,
          "covered": 0,
          "desc": "Vertical day timeline with editing"
        },
        {
          "name": "Settings",
          "lines": 1,
          "covered": 0,
          "desc": "Settings page shell"
        }
      ]
    },
    {
      "name": "Features",
      "children": [
        {
          "name": "Daily Focus",
          "lines": 190,
          "covered": 66,
          "desc": "Balance indicator, focus banner, history, date picker"
        },
        {
          "name": "Lists Management",
          "lines": 125,
          "covered": 35,
          "desc": "Create, edit, delete, reorder, archive lists"
        },
        {
          "name": "Task Search",
          "lines": 120,
          "covered": 55,
          "desc": "Spotlight search with keyboard navigation"
        },
        {
          "name": "Timer",
          "lines": 105,
          "covered": 2,
          "desc": "Start/stop timer, time editing, active timer bar"
        },
        {
          "name": "Timeline",
          "lines": 93,
          "covered": 26,
          "desc": "Daily timeline view, gap filling, doughnut chart"
        },
        {
          "name": "Task Filters",
          "lines": 85,
          "covered": 39,
          "desc": "Filter by list, date, starred, blocker status"
        },
        {
          "name": "Task Actions",
          "lines": 78,
          "covered": 3,
          "desc": "Star, snooze, delete, blocker, estimated time, re-add"
        },
        {
          "name": "Goals",
          "lines": 60,
          "covered": 0,
          "desc": "Add, edit, delete goals with milestones"
        },
        {
          "name": "Edit Task",
          "lines": 45,
          "covered": 3,
          "desc": "Edit dialog with all task fields"
        },
        {
          "name": "Print Tasks",
          "lines": 44,
          "covered": 25,
          "desc": "Print-friendly task list generation"
        },
        {
          "name": "Add Task",
          "lines": 43,
          "covered": 2,
          "desc": "Quick add form with metadata"
        },
        {
          "name": "API Keys",
          "lines": 39,
          "covered": 0,
          "desc": "Create, list, revoke API keys in settings"
        },
        {
          "name": "Task Reorder",
          "lines": 24,
          "covered": 4,
          "desc": "Drag and drop task reordering"
        },
        {
          "name": "Task Temp Select",
          "lines": 12,
          "covered": 12,
          "desc": "Temporary task selection state"
        }
      ]
    },
    {
      "name": "Shared Components",
      "children": [
        {
          "name": "Timeline UI",
          "lines": 269,
          "covered": 0,
          "desc": "DayTimeline, TimelineBar: layout algorithms, overlap detection"
        },
        {
          "name": "Generic UI",
          "lines": 225,
          "covered": 43,
          "desc": "Radix wrappers: dialog, button, select, popover, sidebar"
        },
        {
          "name": "Task Forms",
          "lines": 113,
          "covered": 0,
          "desc": "TaskFormFields, metadata selectors, date picker, duration"
        },
        {
          "name": "Timer UI",
          "lines": 36,
          "covered": 0,
          "desc": "TimerBar, TimeSpentBadge, StartTimerButton"
        },
        {
          "name": "Charts",
          "lines": 16,
          "covered": 0,
          "desc": "DoughnutChart for time distribution"
        }
      ]
    },
    {
      "name": "Backend API",
      "children": [
        {
          "name": "External API",
          "lines": 385,
          "covered": 356,
          "desc": "RESTful API: /api/tasks, goals, lists, initiative, api-keys"
        },
        {
          "name": "Session API",
          "lines": 294,
          "covered": 275,
          "desc": "Internal routes: create/get/update/delete task, goal, list, timer"
        }
      ]
    },
    {
      "name": "Entities & Shared Lib",
      "children": [
        {
          "name": "Utilities",
          "lines": 388,
          "covered": 271,
          "desc": "dayjs, colors, format-duration, drizzle schema, validation, auth, db"
        },
        {
          "name": "API Hooks",
          "lines": 189,
          "covered": 4,
          "desc": "React Query hooks for all API endpoints"
        },
        {
          "name": "Task Entity",
          "lines": 94,
          "covered": 25,
          "desc": "Task model, toggleCompleted, Task/TaskBadges/TaskDetails UI"
        },
        {
          "name": "Goal Entity",
          "lines": 10,
          "covered": 6,
          "desc": "Goal model + Goal UI component"
        },
        {
          "name": "List Entity",
          "lines": 10,
          "covered": 10,
          "desc": "List model"
        }
      ]
    }
  ]
};
// ============================================================

// Compute aggregates
function computeNode(node) {
  if (node.children) {
    node.children.forEach(computeNode);
    node.lines = node.children.reduce((s, c) => s + c.lines, 0);
    node.covered = node.children.reduce((s, c) => s + c.covered, 0);
  }
  node.pct = node.lines > 0 ? (node.covered / node.lines * 100) : 0;
  node.gap = node.lines - node.covered;
  node.value = node.lines;
}
computeNode(data);

document.getElementById('overall').textContent =
  `${data.pct.toFixed(1)}% lines (${data.covered}/${data.lines})`;

function coverageColor(pct) {
  if (pct >= 90) return '#2ecc71';
  if (pct >= 80) return '#27ae60';
  if (pct >= 70) return '#f39c12';
  if (pct >= 55) return '#d35400';
  return '#c0392b';
}

function coverageColorDark(pct) {
  if (pct >= 90) return '#1a7a3a';
  if (pct >= 80) return '#1a6030';
  if (pct >= 70) return '#8a5a10';
  if (pct >= 55) return '#7a3000';
  return '#7a2020';
}

const tooltip = d3.select('#tooltip');
const chart = d3.select('#chart');
let currentRoot = data;

function showTooltip(event, d) {
  const node = d.data || d;
  const pct = node.pct.toFixed(1);
  const color = coverageColor(node.pct);
  tooltip.style('display', 'block')
    .html(`
      <div class="name">${node.name}</div>
      <div class="pct" style="color:${color}">${pct}%</div>
      <div class="detail">${node.covered}/${node.lines} lines covered</div>
      <div class="detail">${node.gap} lines uncovered</div>
      ${node.desc ? `<div class="detail" style="margin-top:4px;color:#aaa">${node.desc}</div>` : ''}
      <div class="bar"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>
    `);
}

function moveTooltip(event) {
  const x = event.clientX + 16;
  const y = event.clientY + 16;
  const rect = tooltip.node().getBoundingClientRect();
  const adjustedX = x + rect.width > window.innerWidth ? event.clientX - rect.width - 16 : x;
  const adjustedY = y + rect.height > window.innerHeight ? event.clientY - rect.height - 16 : y;
  tooltip.style('left', adjustedX + 'px').style('top', adjustedY + 'px');
}

function hideTooltip() {
  tooltip.style('display', 'none');
}

function renderTreemap(root) {
  chart.selectAll('*').remove();
  const { width, height } = chart.node().getBoundingClientRect();

  const hierarchy = d3.hierarchy(root)
    .sum(d => d.children ? 0 : d.lines)
    .sort((a, b) => b.value - a.value);

  d3.treemap()
    .size([width, height])
    .paddingOuter(4)
    .paddingTop(26)
    .paddingInner(2)
    .round(true)(hierarchy);

  const svg = chart.append('svg').attr('width', width).attr('height', height);

  const nodes = svg.selectAll('g')
    .data(hierarchy.descendants())
    .join('g')
    .attr('transform', d => `translate(${d.x0},${d.y0})`);

  // Group headers
  nodes.filter(d => d.children && d.depth > 0)
    .append('rect')
    .attr('width', d => d.x1 - d.x0)
    .attr('height', d => d.y1 - d.y0)
    .attr('rx', 4)
    .attr('fill', d => coverageColorDark(d.data.pct) + '30')
    .attr('stroke', '#333')
    .attr('stroke-width', 1);

  nodes.filter(d => d.children && d.depth > 0)
    .append('text')
    .attr('x', 6)
    .attr('y', 16)
    .text(d => {
      const w = d.x1 - d.x0;
      if (w < 80) return '';
      return `${d.data.name} (${d.data.pct.toFixed(0)}%)`;
    })
    .attr('fill', '#999')
    .attr('font-size', '11px')
    .attr('font-weight', '600');

  // Leaf nodes
  const leaves = nodes.filter(d => !d.children);

  leaves.append('rect')
    .attr('width', d => Math.max(0, d.x1 - d.x0))
    .attr('height', d => Math.max(0, d.y1 - d.y0))
    .attr('rx', 3)
    .attr('fill', d => coverageColor(d.data.pct))
    .attr('opacity', d => 0.15 + (d.data.gap / 150) * 0.7)
    .attr('stroke', d => coverageColor(d.data.pct))
    .attr('stroke-opacity', 0.4)
    .attr('stroke-width', 1)
    .style('cursor', 'pointer');

  leaves.append('text')
    .attr('x', 6)
    .attr('y', 16)
    .text(d => {
      const w = d.x1 - d.x0;
      if (w < 60) return '';
      return d.data.name;
    })
    .attr('fill', '#e0e0e0')
    .attr('font-size', d => (d.x1 - d.x0) < 100 ? '10px' : '12px')
    .attr('font-weight', '500');

  leaves.append('text')
    .attr('x', 6)
    .attr('y', 32)
    .text(d => {
      const w = d.x1 - d.x0;
      const h = d.y1 - d.y0;
      if (w < 60 || h < 40) return '';
      return `${d.data.pct.toFixed(0)}% (${d.data.gap} uncovered)`;
    })
    .attr('fill', d => coverageColor(d.data.pct))
    .attr('font-size', '11px')
    .attr('opacity', 0.9);

  leaves.on('mouseover', showTooltip)
    .on('mousemove', moveTooltip)
    .on('mouseout', hideTooltip)
    .on('click', (event, d) => {
      if (d.parent && d.parent.data.children) {
        currentRoot = d.parent.data;
        render();
        updateBreadcrumb();
      }
    });

  // Group labels clickable to zoom
  nodes.filter(d => d.children && d.depth > 0)
    .style('cursor', 'pointer')
    .on('click', (event, d) => {
      currentRoot = d.data;
      render();
      updateBreadcrumb();
    })
    .on('mouseover', showTooltip)
    .on('mousemove', moveTooltip)
    .on('mouseout', hideTooltip);
}

function updateBreadcrumb() {
  const bc = d3.select('#breadcrumb');
  const path = [];
  let node = currentRoot;
  path.unshift(node);
  function findParent(root, target) {
    if (root === target) return null;
    if (root.children) {
      for (const child of root.children) {
        if (child === target) return root;
        const found = findParent(child, target);
        if (found) return found;
      }
    }
    return null;
  }
  let parent = findParent(data, currentRoot);
  while (parent) {
    path.unshift(parent);
    parent = findParent(data, parent);
  }

  bc.html(path.map((p, i) =>
    i < path.length - 1
      ? `<span onclick="navigateTo(this)" data-idx="${i}">${p.name}</span> / `
      : `<strong>${p.name}</strong>`
  ).join(''));

  window._bcPath = path;
}

window.navigateTo = function(el) {
  const idx = parseInt(el.dataset.idx);
  currentRoot = window._bcPath[idx];
  render();
  updateBreadcrumb();
};

function render() { renderTreemap(currentRoot); }

window.addEventListener('resize', () => render());
render();
updateBreadcrumb();
</script>
</body>
</html>
